openapi: 3.1.0
info:
  title: Api
  version: 0.3.0
  description: Farm Idle Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: spin
    description: Daily spin wheel
  - name: leaderboard
    description: Leaderboard
  - name: stars
    description: Telegram Stars shop
  - name: withdraw
    description: Withdrawal requests
  - name: stats
    description: Live statistics
  - name: vault
    description: Vault / coin locking
  - name: nfts
    description: NFT collection and trading
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/init:
    post:
      operationId: initUser
      tags: [users]
      summary: Initialize or get user from Telegram initData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInitInput"
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{telegramId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by Telegram ID
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /users/{telegramId}/farm-state:
    put:
      operationId: saveFarmState
      tags: [users]
      summary: Save farm state and balance
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmStateInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{telegramId}/achievements:
    get:
      operationId: getAchievements
      tags: [users]
      summary: Get user achievements
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Achievement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  /spin:
    post:
      operationId: dailySpin
      tags: [spin]
      summary: Perform daily spin wheel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpinInput"
      responses:
        "200":
          description: Spin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpinResult"
        "429":
          description: Already spun today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpinCooldown"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top players by coins
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /stars/packages:
    get:
      operationId: getStarPackages
      tags: [stars]
      summary: Get available coin-to-stars packages
      responses:
        "200":
          description: Available packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StarPackage"

  /stars/purchase:
    post:
      operationId: purchaseStars
      tags: [stars]
      summary: Convert coins to Telegram Stars (creates invoice)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StarPurchaseInput"
      responses:
        "200":
          description: Invoice link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarPurchaseResult"
        "400":
          description: Insufficient coins or invalid package

  /referrals/stats/{telegramId}:
    get:
      operationId: getReferralStats
      tags: [users]
      summary: Get referral stats for a user
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"

  /withdraw/request:
    post:
      operationId: requestWithdrawal
      tags: [withdraw]
      summary: Submit a withdrawal request (max 350 TL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawInput"
      responses:
        "200":
          description: Withdrawal request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawResult"
        "400":
          description: Invalid amount or insufficient balance

  /withdraw/history/{telegramId}:
    get:
      operationId: getWithdrawHistory
      tags: [withdraw]
      summary: Get withdrawal history for a user
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Withdrawal history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawEntry"

  /vault/deposit:
    post:
      operationId: vaultDeposit
      tags: [vault]
      summary: Deposit coins into vault with a lock period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultDepositInput"
      responses:
        "200":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDepositResult"
        "400":
          description: Invalid amount or insufficient coins

  /vault/{telegramId}:
    get:
      operationId: getVaultDeposits
      tags: [vault]
      summary: Get all vault deposits for a user
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vault deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultEntry"

  /vault/claim:
    post:
      operationId: claimVaultDeposit
      tags: [vault]
      summary: Claim a matured vault deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultClaimInput"
      responses:
        "200":
          description: Coins claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultClaimResult"
        "400":
          description: Deposit not mature or already claimed

  /nfts/user/{telegramId}:
    get:
      operationId: getUserNfts
      tags: [nfts]
      summary: Get all NFTs owned by a user
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User NFTs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftItem"

  /nfts/list-trade:
    post:
      operationId: listNftForTrade
      tags: [nfts]
      summary: List or delist an NFT for trading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftListTradeInput"
      responses:
        "200":
          description: NFT updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftItem"

  /nfts/market:
    get:
      operationId: getNftMarket
      tags: [nfts]
      summary: Get all NFTs listed for trade
      responses:
        "200":
          description: Market listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftItem"

  /nfts/trade/offer:
    post:
      operationId: createTradeOffer
      tags: [nfts]
      summary: Create a trade offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftTradeOfferInput"
      responses:
        "200":
          description: Trade offer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftTradeOffer"

  /nfts/trade/offers/{telegramId}:
    get:
      operationId: getTradeOffers
      tags: [nfts]
      summary: Get incoming trade offers for a user
      parameters:
        - name: telegramId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trade offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftTradeOffer"

  /nfts/trade/accept:
    post:
      operationId: acceptTradeOffer
      tags: [nfts]
      summary: Accept a trade offer (swap NFTs)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftTradeAcceptInput"
      responses:
        "200":
          description: Trade completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /stats/online:
    get:
      operationId: getOnlineStats
      tags: [stats]
      summary: Get live online player count and stats
      responses:
        "200":
          description: Online stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnlineStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      required: [telegramId, firstName, coins, balance, streakCount, totalReferrals, lastSpinAt, createdAt]
      properties:
        telegramId:
          type: string
        firstName:
          type: string
        username:
          type: ["string", "null"]
        coins:
          type: number
        balance:
          type: number
        farmState:
          $ref: "#/components/schemas/FarmState"
        streakCount:
          type: integer
        totalReferrals:
          type: integer
        lastSpinAt:
          type: ["string", "null"]
        createdAt:
          type: string

    FarmState:
      type: object
      properties:
        wheat:
          type: integer
        chicken:
          type: integer
        cow:
          type: integer
      required: [wheat, chicken, cow]

    UserInitInput:
      type: object
      required: [telegramId, firstName]
      properties:
        telegramId:
          type: string
        firstName:
          type: string
        username:
          type: ["string", "null"]
        referredBy:
          type: ["string", "null"]

    FarmStateInput:
      type: object
      required: [balance, farmState]
      properties:
        balance:
          type: number
        farmState:
          $ref: "#/components/schemas/FarmState"

    SpinInput:
      type: object
      required: [telegramId]
      properties:
        telegramId:
          type: string

    SpinResult:
      type: object
      required: [prize, prizeType, coinsEarned, newCoinsTotal, segmentIndex, canSpinAgainAt]
      properties:
        prize:
          type: string
        prizeType:
          type: string
          enum: [coins, boost, jackpot, miss]
        coinsEarned:
          type: integer
        newCoinsTotal:
          type: number
        segmentIndex:
          type: integer
        canSpinAgainAt:
          type: string
        streakBonus:
          type: ["integer", "null"]

    SpinCooldown:
      type: object
      required: [canSpinAgainAt, hoursRemaining]
      properties:
        canSpinAgainAt:
          type: string
        hoursRemaining:
          type: number

    LeaderboardEntry:
      type: object
      required: [rank, telegramId, firstName, coins, totalReferrals]
      properties:
        rank:
          type: integer
        telegramId:
          type: string
        firstName:
          type: string
        username:
          type: ["string", "null"]
        coins:
          type: number
        totalReferrals:
          type: integer

    Achievement:
      type: object
      required: [key, title, description, icon, earnedAt]
      properties:
        key:
          type: string
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        earnedAt:
          type: string

    StarPackage:
      type: object
      required: [id, stars, coinsRequired, label, popular]
      properties:
        id:
          type: string
        stars:
          type: integer
        coinsRequired:
          type: integer
        label:
          type: string
        popular:
          type: boolean

    StarPurchaseInput:
      type: object
      required: [telegramId, packageId]
      properties:
        telegramId:
          type: string
        packageId:
          type: string

    StarPurchaseResult:
      type: object
      required: [success, invoiceLink, starsAwarded, coinsSpent, newCoinsTotal]
      properties:
        success:
          type: boolean
        invoiceLink:
          type: string
        starsAwarded:
          type: integer
        coinsSpent:
          type: integer
        newCoinsTotal:
          type: number

    ReferralStats:
      type: object
      required: [telegramId, totalReferrals, coinsFromReferrals, referralLink, recentReferrals]
      properties:
        telegramId:
          type: string
        totalReferrals:
          type: integer
        coinsFromReferrals:
          type: integer
        referralLink:
          type: string
        recentReferrals:
          type: array
          items:
            $ref: "#/components/schemas/ReferralEntry"

    ReferralEntry:
      type: object
      required: [firstName, joinedAt, coinsEarned]
      properties:
        firstName:
          type: string
        joinedAt:
          type: string
        coinsEarned:
          type: integer

    WithdrawInput:
      type: object
      required: [telegramId, amount, method]
      properties:
        telegramId:
          type: string
        amount:
          type: number
          description: Amount in TL to withdraw (min 50, max 350)
        method:
          type: string
          description: "Withdrawal method: papara, iban, crypto"

    WithdrawResult:
      type: object
      required: [success, requestId, amount, status, message, newBalance]
      properties:
        success:
          type: boolean
        requestId:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected]
        message:
          type: string
        newBalance:
          type: number

    WithdrawEntry:
      type: object
      required: [id, amount, method, status, createdAt]
      properties:
        id:
          type: string
        amount:
          type: number
        method:
          type: string
        status:
          type: string
        createdAt:
          type: string

    OnlineStats:
      type: object
      required: [onlineCount, totalPlayers, totalCoinsInCirculation]
      properties:
        onlineCount:
          type: integer
        totalPlayers:
          type: integer
        totalCoinsInCirculation:
          type: number

    VaultDepositInput:
      type: object
      required: [telegramId, coins, lockDays]
      properties:
        telegramId:
          type: string
        coins:
          type: integer
          description: Number of coins to deposit (min 100)
        lockDays:
          type: integer
          description: "Lock period in days: 3, 7, 14, or 30"

    VaultDepositResult:
      type: object
      required: [id, coinsDeposited, coinsToReceive, multiplier, maturesAt, lockDays]
      properties:
        id:
          type: string
        coinsDeposited:
          type: integer
        coinsToReceive:
          type: integer
        multiplier:
          type: number
        maturesAt:
          type: string
        lockDays:
          type: integer

    VaultEntry:
      type: object
      required: [id, coinsDeposited, coinsToReceive, multiplier, lockDays, maturesAt, status]
      properties:
        id:
          type: string
        coinsDeposited:
          type: integer
        coinsToReceive:
          type: integer
        multiplier:
          type: number
        lockDays:
          type: integer
        maturesAt:
          type: string
        status:
          type: string
          enum: [locked, mature, claimed]
        createdAt:
          type: string

    VaultClaimInput:
      type: object
      required: [telegramId, depositId]
      properties:
        telegramId:
          type: string
        depositId:
          type: string

    VaultClaimResult:
      type: object
      required: [coinsReceived, newCoinTotal]
      properties:
        coinsReceived:
          type: integer
        newCoinTotal:
          type: integer

    NftItem:
      type: object
      required: [id, ownerTelegramId, nftType, rarity, name, emoji, mintNumber, isListedForTrade, createdAt]
      properties:
        id:
          type: string
        ownerTelegramId:
          type: string
        nftType:
          type: string
        rarity:
          type: string
          enum: [common, rare, special, legendary]
        name:
          type: string
        emoji:
          type: string
        mintNumber:
          type: integer
        isListedForTrade:
          type: boolean
        createdAt:
          type: string

    NftListTradeInput:
      type: object
      required: [telegramId, nftId, list]
      properties:
        telegramId:
          type: string
        nftId:
          type: string
        list:
          type: boolean

    NftTradeOfferInput:
      type: object
      required: [offererTelegramId, offeredNftId]
      properties:
        offererTelegramId:
          type: string
        offeredNftId:
          type: string
        targetTelegramId:
          type: string
        wantedNftType:
          type: string

    NftTradeOffer:
      type: object
      required: [id, offererTelegramId, offeredNftId, status, createdAt]
      properties:
        id:
          type: string
        offererTelegramId:
          type: string
        offeredNftId:
          type: string
        targetTelegramId:
          type: string
        wantedNftType:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected, cancelled]
        createdAt:
          type: string
        offeredNft:
          $ref: "#/components/schemas/NftItem"

    NftTradeAcceptInput:
      type: object
      required: [telegramId, offerId, acceptorNftId]
      properties:
        telegramId:
          type: string
        offerId:
          type: string
        acceptorNftId:
          type: string
